<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="description" content="Formulaire de création d'un patrouilleur." />
    <link href="https://fonts.googleapis.com/css?family=Inknut+Antiqua&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Imprima&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/user.css">
    <title>Formulaire Agent</title>
    <style>
        .agent-form-in {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .agent-form-in .input-group {
            margin: 0;
        }

        .agent-form-in .input-field {
            padding: 16px 18px;
        }

        /* Styles pour les messages */
        .error-message {
            color: #d32f2f;
            background-color: #ffebee;
            border: 1px solid #ffcdd2;
            padding: 16px 20px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: fadeIn 0.3s ease-in;
            position: relative;
        }
        
        .error-message:before {
            content: "!";
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background-color: #d32f2f;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 1px;
        }
        
        .success-message {
            color: #2e7d32;
            background-color: #e8f5e9;
            border: 1px solid #c8e6c9;
            padding: 16px 20px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            animation: fadeIn 0.3s ease-in;
            position: relative;
        }
        
        .success-message:before {
            content: "✓";
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            background-color: #2e7d32;
            color: white;
            border-radius: 50%;
            font-weight: bold;
            flex-shrink: 0;
            margin-top: 1px;
        }
        
        .message-close {
            background: none;
            border: none;
            color: #d32f2f;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: absolute;
            top: 12px;
            right: 12px;
        }
        
        .success-message .message-close {
            color: #2e7d32;
        }
        
        .message-close:hover {
            opacity: 0.8;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-error {
            border: 2px solid #d32f2f !important;
            background-color: #fff5f5;
        }
        
        .error-text {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 5px;
            display: block;
        }
        
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        
        .messages-container {
            max-width: 800px;
            margin: 0 auto 20px auto;
            width: 100%;
        }

        .shortcut-buttons {
            max-width: 980px;
            margin: 8px auto 26px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .shortcut-buttons .form-container {
            margin: 0;
            flex: 1 1 180px;
        }

        .shortcut-buttons .agent-form {
            display: none;
        }

        .shortcut-buttons .submit-redirect {
            width: 100%;
            min-height: 56px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
        }

        .shortcut-buttons .submit-text-redirect {
            text-align: center;
            line-height: 1.3;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="main-container" role="main" aria-label="Contenu principal">
        <!-- Header -->
        <header class="header">
            <div class="logo-section">
                <div class="logo">
                    <img
                        class="frame-2"
                        src="https://c.animaapp.com/mebffkcgJYBuIF/img/frame-11.png"
                        alt="The Peregrine Fund Logo"
                    />
                </div>
                <div class="nav-tabs">
                    <div class="nav-tab active"><a href="/history">Historique</a></div>
                    <div class="nav-tab active"><a href="/stat">Statistiques</a></div>
                    <div class="nav-tab active"><a href="/evenements">Événements</a></div>
                    <div class="nav-tab" th:if="${currentUser.fonction.fonction == 'Administrateur'}">
                        <a href="/users">Admin</a>
                    </div>
                </div>
            </div>
            <div class="tagline-admin">
                <div class="tagline">"Saving raptors, enriching lives."</div>
                <div class="admin-label"><span th:text="${currentUser.fonction.fonction}"></span></div>
            </div>
        </header>

        <!-- Container pour les messages d'erreur/succès -->
        <div class="messages-container">
            <!-- Message d'erreur -->
            <div class="error-message" th:if="${errorMessage}">
                <span th:text="${errorMessage}"></span>
                <button class="message-close" onclick="this.parentElement.remove()">×</button>
            </div>
            
            <!-- Message de succès -->
            <div class="success-message" th:if="${successMessage}">
                <span th:text="${successMessage}"></span>
                <button class="message-close" onclick="this.parentElement.remove()">×</button>
            </div>
        </div>

        <section class="shortcut-buttons">
        <div class="form-container">
            <!-- Formulaire -->
            <form class="agent-form" action="/users" id="user-form-nav" role="form" novalidate>
            </form>

            <!-- Bouton de soumission -->
            <button type="submit" form="user-form-nav" class="submit-redirect" aria-describedby="signin-description">
                <span class="submit-text-redirect">User Form</span>
            </button>
        </div>
        <div class="form-container">
            <!-- Formulaire -->
            <form class="agent-form" action="/userslist" id="users-list-form" role="form" novalidate>
            </form>

            <!-- Bouton de soumission -->
            <button type="submit" form="users-list-form" class="submit-redirect" aria-describedby="signin-description">
                <span class="submit-text-redirect">Liste des utilisateurs</span>
            </button>
        </div>
        <div class="form-container">
            <!-- Formulaire -->
            <form class="agent-form" action="/users-app" method="get" id="agent-form-nav" role="form" novalidate>
            </form>

            <!-- Bouton de soumission -->
            <button type="submit" form="agent-form-nav" class="submit-redirect" aria-describedby="signin-description">
                <span class="submit-text-redirect">Agent Form</span>
            </button>
        </div>
        <div class="form-container">
            <!-- Formulaire -->
            <form class="agent-form" action="/agentslist" id="agents-list-form" role="form" novalidate>
            </form>

            <!-- Bouton de soumission -->
            <button type="submit" form="agents-list-form" class="submit-redirect" aria-describedby="signin-description">
                <span class="submit-text-redirect">Liste des agents</span>
            </button>
        </div>
        <div class="form-container">
            <form class="agent-form" action="/patrouilleurs/form" id="patrouilleur-form-nav" role="form" novalidate>
            </form>
            <button type="submit" form="patrouilleur-form-nav" class="submit-redirect" aria-describedby="signin-description">
                <span class="submit-text-redirect">Patrouilleur Form</span>
            </button>
        </div>
        </section>
        

        <!-- Titre du formulaire -->
        <section class="form-header">
            <h1 class="form-title">FORMULAIRE PATROUILLEUR</h1>
            <div class="raptor-icon"></div>
        </section>

        <!-- Container du formulaire -->
        <div class="form-container">
            <form class="user-form" th:action="@{/patrouilleurs/save}" th:object="${patrouilleur}" method="post" id="patrouilleur-form" novalidate>
                <div class="form-grid">
                    <div class="input-group">
                        <label for="nom-input" class="visually-hidden">Nom</label>
                        <input type="text" th:field="*{nom}" id="nom-input" class="input-field" placeholder="Nom" required />
                    </div>
                    <div class="input-group">
                        <label for="role-input" class="visually-hidden">Rôle</label>
                        <input type="text" th:field="*{role}" id="role-input" class="input-field" placeholder="Rôle" required />
                    </div>
                    <div class="input-group">
                        <label for="telephone-input" class="visually-hidden">Téléphone</label>
                        <input type="tel" th:field="*{telephone}" id="telephone-input" class="input-field" placeholder="Téléphone" required />
                    </div>
                    <div class="input-group">
                        <label for="email-input" class="visually-hidden">Email</label>
                        <input type="email" th:field="*{email}" id="email-input" class="input-field" placeholder="Email" />
                    </div>
                    <div class="input-group">
                        <label for="date-input" class="visually-hidden">Date recrutement</label>
                        <input type="datetime-local" th:field="*{dateRecrutement}" id="date-input" class="input-field" />
                    </div>
                    <div class="input-group">
                        <label for="site-select" class="visually-hidden">Site</label>
                        <select name="site.id_Site" id="site-select" class="input-field" required>
                            <option value="">-- Sélectionnez un site --</option>
                            <option th:each="site : ${sites}" th:value="${site.id_Site}" th:text="${site.nom}"></option>
                        </select>
                    </div>
                </div>
            </form>
            <button type="submit" form="patrouilleur-form" class="submit-btn">
                <span class="submit-text">Ajouter patrouilleur</span>
            </button>
        </div>
    </div>

     <!-- Footer -->
    <footer class="footer">
        <div class="main-container">
            <a href="/logout" class="logout-btn">
                <div class="logout-icon">
                    <img
                        class="logout-icon"
                        src="images/logout.png"
                        alt="The Peregrine Fund Logo"
                    />
                </div>
                Déconnexion
            </a>
        </div>
    </footer>
</body>
</html>
