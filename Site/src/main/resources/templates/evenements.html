<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://fonts.googleapis.com/css?family=Inknut+Antiqua&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Imprima&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/historique.css}" />
    <title>Événements</title>
</head>
<body>
<div class="main-container">
    <header class="header">
        <div class="logo-section">
            <div class="logo">
                <img class="frame-2" src="https://c.animaapp.com/mebffkcgJYBuIF/img/frame-11.png" alt="The Peregrine Fund Logo"/>
            </div>
            <div class="nav-tabs">
                <div class="nav-tab"><a href="/history">Historique</a></div>
                <div class="nav-tab active"><a href="/stat">Statistiques</a></div>
                <div class="nav-tab active"><a href="/evenements">Événements</a></div>
                <div class="nav-tab active" th:if="${user.fonction.fonction == 'Administrateur'}">
                    <a href="/users">Admin</a>
                </div>
            </div>
        </div>
        <div class="tagline-admin">
            <div class="tagline">"Saving raptors, enriching lives."</div>
            <div class="admin-label"><span th:text="${user.fonction.fonction}"></span></div>
        </div>
    </header>

    <section class="actions-section">
        <div class="action-group">
            <form method="get" action="/evenements" class="event-group-actions">
                <div class="event-group-field" style="min-width: 220px;">
                    <label for="filterNom">Nom</label>
                    <input id="filterNom" name="nom" type="text" th:value="${filterNom}" placeholder="Rechercher un titre" />
                </div>
                <div class="event-group-field" style="min-width: 180px;">
                    <label for="filterDate">Date</label>
                    <input id="filterDate" name="date" type="date" th:value="${filterDate}" />
                </div>
                <button type="submit" class="action-btn export-btn">Filtrer</button>
                <a href="/evenements" class="action-btn import-btn" style="text-decoration:none; display:inline-flex; align-items:center;">Réinitialiser</a>
            </form>
        </div>
    </section>

    <section class="data-table-container">
        <table class="data-table">
            <thead class="table-header">
            <tr>
                <th>Titre</th>
                <th>Date</th>
                <th>Description</th>
                <th>Messages</th>
                <th></th>
            </tr>
            </thead>
            <tbody class="table-body">
            <tr class="table-row" th:each="evenement : ${evenements}">
                <td class="table-cell" data-column="site" th:text="${evenement.nom}"></td>
                <td class="table-cell" data-column="dateCommencement" th:text="${#temporals.format(evenement.date, 'yyyy-MM-dd')}"></td>
                <td class="table-cell" data-column="description" th:text="${evenement.description != null ? evenement.description : ''}"></td>
                <td class="table-cell" data-column="status" th:text="${evenement.messages != null ? evenement.messages.size() : 0}"></td>
                <td class="table-cell" data-column="action">
                    <a class="action-btn export-btn" th:href="@{/evenements/{id}(id=${evenement.idEvenement})}" style="text-decoration:none;">Voir</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(evenements)}">
                <td class="table-cell" colspan="5">Aucun événement trouvé.</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
<footer class="footer">
    <div class="main-container">
        <a href="/logout" class="logout-btn">
            <div class="logout-icon">
                <img class="logout-icon" src="images/logout.png" alt="The Peregrine Fund Logo"/>
            </div>
            Déconnexion
        </a>
    </div>
</footer>
</body>
</html>
