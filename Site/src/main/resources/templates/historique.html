<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta name="description" content="Historique des messages, alertes et statuts pour le suivi opérationnel." />
    <link href="https://fonts.googleapis.com/css?family=Inknut+Antiqua&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Imprima&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/historique.css}" />
    <title>Historique</title>
</head>
<body>
<div class="main-container" role="main" aria-label="Contenu principal">
    <!-- Header -->
    <header class="header">
        <div class="logo-section">
            <div class="logo">
                <img class="frame-2" src="https://c.animaapp.com/mebffkcgJYBuIF/img/frame-11.png" alt="The Peregrine Fund Logo"/>
            </div>
            <div class="nav-tabs">
                <div class="nav-tab"><a href="/history">Historique</a></div>
                <div class="nav-tab active"><a href="/stat">Statistiques</a></div>
                <div class="nav-tab active" th:if="${user.fonction.fonction == 'Administrateur'}">
                    <a href="/users">Admin</a>
                </div>
                <div class="nav-tab active" th:if="${user.fonction.fonction == 'Administrateur'}">
                    <a href="/gateway">Gateway</a>
                </div>
            </div>
        </div>
        <div class="tagline-admin">
            <div class="tagline">"Saving raptors, enriching lives."</div>
            <div class="admin-label"><span th:text="${user.fonction.fonction}"></span></div>
        </div>
    </header>

    <!-- Filtres -->
    <section class="filters-section">
        <div class="filter-group">
            <label for="filterYear">Année</label>
            <select id="filterYear" class="filter-select">
                <option value="">Toutes</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="filterMonth">Mois</label>
            <select id="filterMonth" class="filter-select">
                <option value="">Tous</option>
                <option value="01">Janvier</option>
                <option value="02">Février</option>
                <option value="03">Mars</option>
                <option value="04">Avril</option>
                <option value="05">Mai</option>
                <option value="06">Juin</option>
                <option value="07">Juillet</option>
                <option value="08">Août</option>
                <option value="09">Septembre</option>
                <option value="10">Octobre</option>
                <option value="11">Novembre</option>
                <option value="12">Décembre</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="filterAlerte">Alerte</label>
            <select id="filterAlerte" class="filter-select">
                <option value="">Toutes</option>
                <option value="Rouge">Rouge</option>
                <option value="Orange">Orange</option>
                <option value="Jaune">Jaune</option>
                <option value="Vert">Vert</option>
            </select>
        </div>

        <div class="filter-group">
            <label for="filterSite">Site</label>
            <select id="filterSite" class="filter-select">
                <option value="">Tous</option>
                <option th:each="site : ${sites}" th:value="${site.getNom()}" th:text="${site.getNom()}"></option>
            </select>
        </div>

        <div class="filter-group">
            <label for="filterStatus">Status</label>
            <select id="filterStatus" class="filter-select">
                <option value="">Tous</option>
                <option value="Debut de feu">Debut de feu</option>
                <option value="En cours">En cours</option>
                <option value="Maitrise">Maitrise</option>
            </select>
        </div>
    </section>

    <!-- Table des données -->
    <section class="data-table-container">
        <table class="data-table">
            <thead class="table-header">
            <tr>
                <th>Site</th>
                <th>Alerte</th>
                <th>Status</th>
                <th>Date</th>
                <th>Agent</th>
                <th>Surface</th>
            </tr>
            </thead>
            <tbody class="table-body" id="messageTable">
            <tr class="table-row"
                th:each="msg : ${messages}"
                th:data-annee="${#temporals.format(msg.dateCommencement, 'yyyy')}"
                th:data-mois="${#temporals.format(msg.dateCommencement, 'MM')}"
                th:data-alerte="${alerteMessage[msg.idMessage] != null ? alerteMessage[msg.idMessage].get(0).typeAlerte.zone : ''}"
                th:data-site="${msg.userApp.patrouilleur.site.nom}"
                th:data-status="${statusMessage[msg.idMessage] != null ? statusMessage[msg.idMessage].status.status : ''}">

                <!-- Site -->
                <td class="table-cell" th:text="${msg.userApp.patrouilleur.site.nom}"></td>

                <!-- Alerte -->
                <td class="table-cell">
                    <span th:each="a : ${alerteMessage[msg.idMessage]}"
                          th:text="${a.typeAlerte.zone}"></span>
                </td>

                <!-- Dernier statut -->
                <td class="table-cell"
                    th:text="${statusMessage[msg.idMessage] != null ? statusMessage[msg.idMessage].status.status : ''}">
                </td>

                <!-- Date -->
                <td class="table-cell" th:text="${#temporals.format(msg.dateCommencement, 'yyyy-MM-dd HH:mm')}"></td>

                <!-- Agent -->
                <td class="table-cell" th:text="${msg.userApp.patrouilleur.nom}"></td>

                <!-- Surface -->
                <td class="table-cell" th:text="${msg.surfaceApproximative}"></td>
            </tr>
            </tbody>
        </table>

        <div class="pagination-toolbar">
            <div class="pagination-info" id="paginationInfo">0 résultat</div>
            <div class="page-size-group">
                <label for="pageSize">Lignes par page</label>
                <select id="pageSize" class="filter-select page-size-select">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="50">50</option>
                </select>
            </div>
        </div>

        <div class="pagination-controls" id="paginationControls"></div>
        <div class="empty-state" id="emptyState" hidden>Aucun résultat ne correspond aux filtres sélectionnés.</div>
    </section>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="main-container">
        <a href="/logout" class="logout-btn">
            <div class="logout-icon">
                <img class="logout-icon" src="images/logout.png" alt="The Peregrine Fund Logo"/>
            </div>
            Déconnexion
        </a>
    </div>
</footer>

<!-- Script pour filtres -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const filterYear = document.getElementById("filterYear");
    const filterMonth = document.getElementById("filterMonth");
    const filterAlerte = document.getElementById("filterAlerte");
    const filterSite = document.getElementById("filterSite");
    const filterStatus = document.getElementById("filterStatus");
    const pageSize = document.getElementById("pageSize");
    const paginationInfo = document.getElementById("paginationInfo");
    const paginationControls = document.getElementById("paginationControls");
    const emptyState = document.getElementById("emptyState");
    const rows = Array.from(document.querySelectorAll("#messageTable tr.table-row"));

    let currentPage = 1;

    function getFilteredRows() {
        const year = (filterYear.value || "").trim();
        const month = (filterMonth.value || "").trim();
        const alerte = (filterAlerte.value || "").trim().toLowerCase();
        const site = (filterSite.value || "").trim().toLowerCase();
        const status = (filterStatus.value || "").trim().toLowerCase();

        return rows.filter(row => {
            const rowYear = (row.dataset.annee || "").trim();
            const rowMonth = (row.dataset.mois || "").trim();
            const rowAlerte = (row.dataset.alerte || "").trim().toLowerCase();
            const rowSite = (row.dataset.site || "").trim().toLowerCase();
            const rowStatus = (row.dataset.status || "").trim().toLowerCase();

            if (year && rowYear !== year) return false;
            if (month && rowMonth !== month) return false;
            if (alerte && rowAlerte !== alerte) return false;
            if (site && rowSite !== site) return false;
            if (status && rowStatus !== status) return false;
            return true;
        });
    }

    function createPageButton(label, pageNumber, isActive = false, isDisabled = false) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `pagination-btn${isActive ? " active" : ""}`;
        button.textContent = label;
        button.disabled = isDisabled;
        button.addEventListener("click", () => {
            currentPage = pageNumber;
            renderTable();
        });
        return button;
    }

    function renderPagination(totalPages) {
        paginationControls.innerHTML = "";

        if (totalPages <= 1) {
            return;
        }

        paginationControls.appendChild(createPageButton("Précédent", currentPage - 1, false, currentPage === 1));

        const pages = new Set([1, totalPages, currentPage - 1, currentPage, currentPage + 1]);
        const visiblePages = Array.from(pages)
            .filter(page => page >= 1 && page <= totalPages)
            .sort((a, b) => a - b);

        let previousPage = 0;
        visiblePages.forEach(page => {
            if (page - previousPage > 1) {
                const ellipsis = document.createElement("span");
                ellipsis.className = "pagination-ellipsis";
                ellipsis.textContent = "...";
                paginationControls.appendChild(ellipsis);
            }

            paginationControls.appendChild(createPageButton(String(page), page, page === currentPage));
            previousPage = page;
        });

        paginationControls.appendChild(createPageButton("Suivant", currentPage + 1, false, currentPage === totalPages));
    }

    function renderTable() {
        const filteredRows = getFilteredRows();
        const selectedPageSize = Number(pageSize.value) || 10;
        const totalPages = Math.max(1, Math.ceil(filteredRows.length / selectedPageSize));

        if (currentPage > totalPages) {
            currentPage = totalPages;
        }

        const startIndex = (currentPage - 1) * selectedPageSize;
        const visibleRows = filteredRows.slice(startIndex, startIndex + selectedPageSize);

        rows.forEach(row => {
            row.style.display = "none";
        });

        visibleRows.forEach(row => {
            row.style.display = "";
        });

        paginationInfo.textContent = `${filteredRows.length} résultat(s) - page ${filteredRows.length === 0 ? 0 : currentPage}/${totalPages}`;
        emptyState.hidden = filteredRows.length !== 0;
        renderPagination(totalPages);
    }

    [filterYear, filterMonth, filterAlerte, filterSite, filterStatus].forEach(el => {
        el.addEventListener("change", () => {
            currentPage = 1;
            renderTable();
        });
    });

    pageSize.addEventListener("change", () => {
        currentPage = 1;
        renderTable();
    });

    renderTable();
});
</script>
</body>
</html>
