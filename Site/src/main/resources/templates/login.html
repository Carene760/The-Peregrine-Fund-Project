<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta name="description" content="Page de connexion du système The Peregrine Fund pour accéder aux tableaux de bord et aux outils de gestion." />
    <title>The Peregrine Fund - Login</title>
    <link rel="stylesheet" th:href="@{/css/globals.css}" />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <div class="desktop">
      <main class="div" role="main" aria-label="Connexion">
        <header class="frame">
          <img
            class="frame-2"
            src="https://c.animaapp.com/mebffkcgJYBuIF/img/frame-11.png"
            alt="The Peregrine Fund Logo"
          />
          <div class="saving-raptors-wrapper">
            <p class="saving-raptors">"Saving raptors, enriching lives."</p>
          </div>
        </header>
        
        <!-- Message d'erreur -->
        <div th:if="${error}" class="error-message" role="alert" aria-live="polite">
          <span th:text="${error}">Nom d'utilisateur ou mot de passe incorrect</span>
        </div>
        
        <section class="frame-3">
          <img class="frame-4" src="https://c.animaapp.com/mebffkcgJYBuIF/img/frame-56.png" alt="Raptor icon" />
          <h1 class="text-wrapper" id="login-heading">LOG IN</h1>
        </section>
        <form class="frame-5" action="/login" method="post" id="login-form" role="form" aria-labelledby="login-heading" novalidate>
          <div class="div-wrapper">
            <label for="name-input" class="visually-hidden">Email</label>
            <input
              type="text"
              name="email"
              id="name-input"
              class="text-wrapper-2"
              placeholder="Email"
              th:value="${submittedEmail != null ? submittedEmail : ''}"
              required
              aria-required="true"
              autocomplete="email"
            />
          </div>
          <div class="div-wrapper password-wrapper">
            <label for="password-input" class="visually-hidden">Password</label>
            <input
              type="password"
              name="password"
              id="password-input"
              class="text-wrapper-2"
              placeholder="Password"
              th:value="${submittedPassword != null ? submittedPassword : ''}"
              required
              aria-required="true"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="password-toggle"
              id="password-toggle"
              aria-label="Afficher le mot de passe"
              aria-pressed="false"
            >
              Afficher
            </button>
          </div>
        </form>
        <button type="submit" form="login-form" class="frame-6" aria-describedby="signin-description">
          <span class="text-wrapper-3">Sign in</span>
        </button>
        
      </main>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const passwordInput = document.getElementById("password-input");
        const passwordToggle = document.getElementById("password-toggle");

        if (!passwordInput || !passwordToggle) {
          return;
        }

        passwordToggle.addEventListener("click", () => {
          const isHidden = passwordInput.type === "password";
          passwordInput.type = isHidden ? "text" : "password";
          passwordToggle.textContent = isHidden ? "Masquer" : "Afficher";
          passwordToggle.setAttribute("aria-label", isHidden ? "Masquer le mot de passe" : "Afficher le mot de passe");
          passwordToggle.setAttribute("aria-pressed", String(isHidden));
        });
      });
    </script>
  </body>
</html>
