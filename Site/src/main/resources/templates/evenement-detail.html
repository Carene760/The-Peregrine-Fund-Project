<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link href="https://fonts.googleapis.com/css?family=Inknut+Antiqua&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Imprima&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Inter&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/historique.css}" />
    <title>Détail événement</title>
</head>
<body>
<div class="main-container">
    <header class="header">
        <div class="logo-section">
            <div class="logo">
                <img class="frame-2" src="https://c.animaapp.com/mebffkcgJYBuIF/img/frame-11.png" alt="The Peregrine Fund Logo"/>
            </div>
            <div class="nav-tabs">
                <div class="nav-tab"><a href="/history">Historique</a></div>
                <div class="nav-tab active"><a href="/stat">Statistiques</a></div>
                <div class="nav-tab active"><a href="/evenements">Événements</a></div>
                <div class="nav-tab active" th:if="${user.fonction.fonction == 'Administrateur'}">
                    <a href="/users">Admin</a>
                </div>
                <div class="nav-tab" th:if="${currentUser.fonction.fonction == 'Administrateur'}">
                    <a href="/admin/gateway/webhooks/ui">Webhooks</a>
                </div>
            </div>
        </div>
        <div class="tagline-admin">
            <div class="tagline">"Saving raptors, enriching lives."</div>
            <div class="admin-label"><span th:text="${user.fonction.fonction}"></span></div>
        </div>
    </header>

    <section class="event-group-section" style="margin-top: 10px;">
        <div class="event-group-header">
            <div>
                <h4 th:text="${evenement.nom}"></h4>
                <p>
                    <span th:text="${#temporals.format(evenement.date, 'yyyy-MM-dd')}"></span>
                    <span th:if="${evenement.description != null and !#strings.isEmpty(evenement.description)}"> - </span>
                    <span th:if="${evenement.description != null and !#strings.isEmpty(evenement.description)}" th:text="${evenement.description}"></span>
                </p>
            </div>
            <div class="event-group-counter" th:text="${#lists.size(messages)} + ' message(s) associé(s)'"></div>
        </div>
    </section>

    <section class="data-table-container">
        <table class="data-table">
            <thead class="table-header">
            <tr>
                <th>Site</th>
                <th>Date Début</th>
                <th>Date Signalement</th>
                <th>Intervention</th>
                <th>Status</th>
                <th>Alerte</th>
                <th>Agent</th>
            </tr>
            </thead>
            <tbody class="table-body">
            <tr class="table-row" th:each="msg : ${messages}">
                <td class="table-cell" th:text="${msg.userApp != null && msg.userApp.patrouilleur != null && msg.userApp.patrouilleur.site != null ? msg.userApp.patrouilleur.site.nom : ''}"></td>
                <td class="table-cell" th:text="${#temporals.format(msg.dateCommencement, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="table-cell" th:text="${#temporals.format(msg.dateSignalement, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="table-cell" th:text="${msg.intervention != null ? msg.intervention.intervention : ''}"></td>
                <td class="table-cell" th:text="${statusMessage[msg.idMessage] != null ? statusMessage[msg.idMessage].status.status : ''}"></td>
                <td class="table-cell" th:text="${alerteMessage[msg.idMessage] != null ? alerteMessage[msg.idMessage].get(0).typeAlerte.zone : ''}"></td>
                <td class="table-cell" th:text="${msg.userApp != null && msg.userApp.patrouilleur != null ? msg.userApp.patrouilleur.nom : ''}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(messages)}">
                <td class="table-cell" colspan="7">Aucun message rattaché à cet événement.</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
<footer class="footer">
    <div class="main-container">
        <a href="/logout" class="logout-btn">
            <div class="logout-icon">
                <img class="logout-icon" src="images/logout.png" alt="The Peregrine Fund Logo"/>
            </div>
            Déconnexion
        </a>
    </div>
</footer>
</body>
</html>
